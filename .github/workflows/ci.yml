name: ci

on:
  push:
    branches:
      - 'main'
      - 'release/*'
      - 'CBG*'
      - 'ci-*'
      - 'feature*'
  pull_request:
    branches:
      - 'main'
      - 'release/*'

env:
  ACTIONS_CHECKOUT_VERSION: &actions_checkout_version actions/checkout@v6
  ACTIONS_SETUP_GO_VERSION: &actions_setup_go_version actions/setup-go@v6
  GO_VERSION: &go_version 1.26.4
  GO_TEST_ANNOTATIONS_VERSION: &go_test_annotations_version guyarb/golang-test-annotations@v0.9.0

jobs:
  addlicense:
    name: addlicense
    runs-on: ubuntu-latest
    steps:
      - uses: *actions_checkout_version
      - uses: *actions_setup_go_version
        with:
          go-version: *go_version
      - run: go install github.com/google/addlicense@latest
      - run: addlicense -check -f licenses/addlicense.tmpl .

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: *actions_checkout_version
      - uses: *actions_setup_go_version
        with:
          go-version: *go_version
      - name: Build
        run: go build -v "./..."
      - name: Run Tests
        run: go test -timeout=30m -count=1 -json -v "./..." | tee test.json | jq -s -jr 'sort_by(.Package,.Time) | .[].Output | select (. != null )'
        shell: bash
      - name: Annotate Failures
        if: always()
        uses: *go_test_annotations_version
        with:
          test-results: test.json

  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: *actions_checkout_version
      - uses: *actions_setup_go_version
        with:
          go-version: *go_version
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test-race:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: *actions_checkout_version
      - uses: *actions_setup_go_version
        with:
          go-version: *go_version
      - name: Run Tests
        run: go test -race -timeout=30m -count=1 -json -v "./..." | tee test.json | jq -s -jr 'sort_by(.Package,.Time) | .[].Output | select (. != null )'
        shell: bash
      - name: Annotate Failures
        if: always()
        uses: *go_test_annotations_version
        with:
          test-results: test.json
